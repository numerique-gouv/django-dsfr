description:
  fr:
    shortDescription: "Intégration du système de design de l'État français dans Django"
    longDescription: >
      Django-DSFR est une application Django permettant d'intégrer le Système de
      design de l'État français (DSFR) dans des projets Django. Elle fournit des
      composants, des balises de gabarit et des ressources statiques correspondant
      aux spécifications officielles du DSFR, facilitant ainsi la création de
      services numériques conformes à la charte graphique de l'État. Compatible
      avec Python 3.10 à 3.14 et Django 4, 5 et 6.
    documentation: "https://numerique-gouv.github.io/django-dsfr/"
    features:
      - "Composants DSFR intégrés comme balises de gabarit Django"
      - "Ressources statiques du DSFR incluses"
      - "Application d'exemple pour tester les composants"
      - "Compatible avec les versions supportées de Django et Python"
